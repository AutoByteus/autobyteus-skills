interface:
  display_name: "Deep Research Article"
  short_description: "Deep research into one logical article."
  default_prompt: "Do internet-backed deep research on the topic before drafting. Build a source dossier, extract evidence, maintain a claim→evidence ledger, iteratively improve one logically structured article (thesis → moves → evidence → objections → takeaways), pass logic/evidence QA gates, then output a slide-extraction table for an image-only deck."
