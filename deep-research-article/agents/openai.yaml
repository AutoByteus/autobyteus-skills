interface:
  display_name: "Deep Research Article"
  short_description: "Deep research into one logical article."
  default_prompt: "Do internet-backed deep research on the topic before drafting. Build a source dossier, extract evidence, maintain a claim→evidence ledger, iteratively improve one logically structured long-form article (thesis -> mainline statement -> moves -> evidence -> objections -> takeaways), default to paper-grade depth unless the user explicitly asks for brevity, integrate evidence directly into the body instead of outsourcing it to the references section, pass logic/evidence/objectivity/mainline-coherence/final-quality QA gates, and stop at an approved article plus supporting research artifacts. If the user later wants slides, hand the approved article directly to infographic-powerpoint-deck rather than mixing slide-generation concerns into deep research."
