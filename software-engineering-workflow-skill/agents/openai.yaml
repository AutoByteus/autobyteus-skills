interface:
  display_name: "Software Engineering Workflow"
  short_description: "Staged engineering delivery loop"
  default_prompt: >-
    Use $software-engineering-workflow-skill with strict stage-gate and
    ticket-lifecycle discipline. Treat the skill's own files as canonical
    rather than duplicating workflow prose in the prompt: use `SKILL.md` for
    the stage map and default artifact paths, `shared/workflow-control.md` for
    transition, re-entry, workflow-state, edit-lock, and notification rules,
    `shared/design-principles.md` for shared design doctrine, and
    `shared/workflow-state-template.md` for the execution-control artifact
    shape. Use the matching `stages/*` files for stage-specific behavior. Keep
    one ticket-local artifact set, maintain `workflow-state.md` as the
    execution lock controller, do not edit source unless the lock rules allow
    it, do not skip gates, and do not move to archival/finalization until the
    explicit user-verification rules in Stage 10 are satisfied.
