interface:
  display_name: "Software Engineering Workflow"
  short_description: "Durable staged engineering workflow"
  default_prompt: >-
    Use $software-engineering-workflow-skill as a durable staged engineering task workflow:
    investigate enough to understand the current behavior and touched ownership
    area, clarify requirements and acceptance criteria, keep design concise unless
    fuller design reduces risk, implement with the repository's existing patterns,
    inspect rendered frontend quality when UI is affected, validate with proportional
    executable evidence, review the diff, update long-lived
    docs when needed, and provide a concise handoff. Create or reuse
    `tickets/in-progress/<ticket-name>/`; in git repositories, create or reuse a
    dedicated task branch/worktree before writing stage artifacts. Do not create
    separate workflow control artifacts, add extra architecture review
    artifacts, use notification tools for stage movement, or run repository
    finalization unless the user explicitly asks. Write durable artifacts for
    each reached stage: `requirements.md`, `investigation-notes.md`,
    `proposed-design.md` when fuller design is needed, `implementation.md`,
    `executable-validation.md`, `code-review.md`, `docs-sync.md`, `handoff-summary.md`, and
    `release-notes.md` when release notes are required. Preserve shared design principles:
    data-flow spine clarity, ownership clarity, off-spine concerns with explicit
    owners, the Authoritative Boundary Rule, coherent file placement, clear API
    subject boundaries, no unjustified duplication, no backward-compatibility
    shims or legacy retention in scope, and cleanup of obsolete code. Use the
    shortest honest loop when problems appear: unclear root cause returns to
    investigation, missing behavior to requirements, ownership/API/placement
    defects to design, implementation defects to code, and insufficient evidence
    to validation.
